name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Unit tests
        run: make test

  build:
    needs:
      - unit-tests
    runs-on: ubuntu-24.04
    outputs:
      repo_specs: ${{ steps.matrix.outputs.repos }}
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_URL: https://safelibs.org/apt/
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg jq python3-yaml

      - name: Build Pages site
        run: make build-site

      - name: Compute verify matrix
        id: matrix
        run: |
          repos=$(jq -c '[.channels[].repositories[] | {name, path}]' site/manifest.json)
          if [[ -z "${repos}" || "${repos}" == "[]" ]]; then
            echo "manifest.json yielded an empty repository list" >&2
            exit 1
          fi
          echo "repos=${repos}" >>"${GITHUB_OUTPUT}"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-site
          path: site/
          retention-days: 1
          include-hidden-files: false

  verify:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: ${{ startsWith(matrix.repo.path, 'testing/') }}
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.build.outputs.repo_specs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: apt-site
          path: site/

      - name: Verify ${{ matrix.repo.name }} (${{ matrix.repo.path }}) in Ubuntu 24.04 Docker
        run: |
          bash scripts/verify-in-ubuntu-docker.sh \
            "site" \
            "repositories.yml" \
            "${{ matrix.repo.name }}" \
            "${{ matrix.repo.path }}"
